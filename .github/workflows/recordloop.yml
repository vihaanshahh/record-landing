name: RecordLoop
on:
  pull_request:
    types: [opened, synchronize, reopened]
permissions:
  pull-requests: write
  contents: write
jobs:
  recordloop:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: vihaanshahh/recordloop@feat/login-context
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          storage-state: ${{ secrets.RECORDLOOP_STORAGE_STATE }}
